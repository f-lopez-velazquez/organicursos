name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Run smoke tests
        run: npm run test:smoke
      - name: Run frontend tests
        run: npm test

  tauri-check:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: choco install ffmpeg --yes --no-progress
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install ffmpeg
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install frontend dependencies
        run: npm ci
      - name: Prepare Windows native assets
        if: runner.os == 'Windows'
        run: |
          powershell -ExecutionPolicy Bypass -File ./scripts/stage-ffmpeg-sidecars.ps1
          powershell -ExecutionPolicy Bypass -File ./scripts/fetch-sqlite-vec-windows.ps1
      - name: Prepare macOS native assets
        if: runner.os == 'macOS'
        run: |
          bash ./scripts/stage-ffmpeg-sidecars-macos.sh
          bash ./scripts/stage-sqlite-vec-macos.sh
      - name: Prepare Linux native assets
        if: runner.os == 'Linux'
        run: |
          bash ./scripts/stage-ffmpeg-sidecars-linux.sh
          bash ./scripts/stage-sqlite-vec-linux.sh
      - name: Cargo check
        working-directory: src-tauri
        run: cargo check
      - name: Cargo test
        working-directory: src-tauri
        run: cargo test
