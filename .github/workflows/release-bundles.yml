name: Release Bundles

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag opcional para publicar release, por ejemplo v0.1.1"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: choco install ffmpeg --yes --no-progress
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install ffmpeg
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install frontend dependencies
        run: npm ci
      - name: Prepare Windows native assets
        if: runner.os == 'Windows'
        run: |
          powershell -ExecutionPolicy Bypass -File ./scripts/stage-ffmpeg-sidecars.ps1
          powershell -ExecutionPolicy Bypass -File ./scripts/fetch-sqlite-vec-windows.ps1
      - name: Prepare macOS native assets
        if: runner.os == 'macOS'
        run: |
          bash ./scripts/stage-ffmpeg-sidecars-macos.sh
          bash ./scripts/stage-sqlite-vec-macos.sh
      - name: Prepare Linux native assets
        if: runner.os == 'Linux'
        run: |
          bash ./scripts/stage-ffmpeg-sidecars-linux.sh
          bash ./scripts/stage-sqlite-vec-linux.sh
      - name: Run smoke tests
        run: npm run test:smoke
      - name: Run frontend tests
        run: npm test
      - name: Cargo check
        working-directory: src-tauri
        run: cargo check
      - name: Build Windows bundle
        if: runner.os == 'Windows'
        run: powershell -ExecutionPolicy Bypass -File ./scripts/build-windows-release.ps1 -SkipTests -CargoTargetDir "$PWD\\src-tauri\\target"
      - name: Build macOS bundle
        if: runner.os == 'macOS'
        run: bash ./scripts/build-macos-release.sh --skip-tests --cargo-target-dir "$PWD/src-tauri/target"
      - name: Build Linux bundle
        if: runner.os == 'Linux'
        run: bash ./scripts/build-linux-release.sh --skip-tests --cargo-target-dir "$PWD/src-tauri/target"
      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ runner.os }}
          path: |
            src-tauri/target/release/bundle/**
          if-no-files-found: ignore

  publish:
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release_tag != ''
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Download bundle artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bundle-*
          path: release-artifacts
          merge-multiple: false

      - name: Resolve release tag
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build release notes
        run: |
          cat > release-notes.md <<EOF
          OrganiCursos ${VERSION}

          Artefactos generados automáticamente para distribución multiplataforma.

          Incluye, según la plataforma disponible:
          - instaladores de Windows
          - bundles y DMG para macOS
          - AppImage y paquete .deb para Linux

          Recomendaciones:
          - usa Releases para descargar binarios
          - usa el repositorio para revisar código, documentación y scripts de build
          EOF
        env:
          VERSION: ${{ steps.meta.outputs.version }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: OrganiCursos ${{ steps.meta.outputs.version }}
          body_path: release-notes.md
          files: |
            release-artifacts/**/*
